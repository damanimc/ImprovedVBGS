seed: 0
device: 0
experiment_name: rooms
model: 
  n_components: 100_000
  init_random: True
  dof: 1
  scale: ${model.n_components}
  use_reassign: True
  reassign_fraction: 0.05
data: 
  model_name: van-gogh-room
  data_path: /home/shared/habitat_processed/habitat-test-scenes/${data.model_name}/
  data_index: ""
  subsample_factor: null
  shuffle: True
  n_frames: 200
train: 
  batch_size: 500
  learning_rate: 1.0
  beta: 0.0
  n_iters: 1
precision:
  mode: op
  tolerance: 1.0e-6
  search_frame: 1
output_root: ${oc.env:VBGS_OUTPUT_DIR,../output}
run_name: ${experiment_name}
hydra: 
  job: 
    chdir: True
  run: 
    dir: ${output_root}/${run_name}
  sweep: 
    dir: ${output_root}/sweep/${run_name}
    subdir: ""